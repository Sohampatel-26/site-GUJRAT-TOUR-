<style>
  * { font-family: 'Noto Sans Gujarati', sans-serif; box-sizing: border-box; }

  body {
    margin: 0;
    overflow-x: hidden;
    background-color: #0a0a0a;
    color: white;
  }

  /* ===== TRANSITION SCREENS ===== */
  .screen {
    position: absolute;
    top: 0; left: 0; width: 100%; min-height: 100vh;
    transition: opacity 0.8s ease-in-out, transform 0.8s ease-in-out;
  }
  .screen-hidden { opacity: 0; pointer-events: none; transform: scale(0.95); }
  .screen-active { opacity: 1; pointer-events: all; transform: scale(1); }

  /* ===== MAP STYLES ===== */
  #map-screen {
    background: radial-gradient(circle at top, #1a1a2e 0%, #050505 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 40px 20px;
  }

  .map-container {
    position: relative;
    width: 100%;
    max-width: 900px;
    margin: 0 auto;
  }

  /* WIKIMEDIA MAP STYLING */
  .official-map {
    width: 100%;
    height: auto;
    display: block;
    filter: invert(1) sepia(0.5) hue-rotate(180deg) brightness(0.8) opacity(0.8) drop-shadow(0 0 20px rgba(0, 150, 255, 0.3));
    user-select: none;
    pointer-events: none;
  }

  /* Glowing Map Pins */
  .map-pin {
    position: absolute;
    width: 16px; height: 16px;
    background-color: #fbbf24;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 0 15px #fbbf24;
    z-index: 10;
  }

  .map-pin::after {
    content: ''; position: absolute;
    top: -4px; left: -4px; right: -4px; bottom: -4px;
    border-radius: 50%; border: 2px solid #fbbf24;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0% { transform: scale(0.8); opacity: 1; }
    100% { transform: scale(2.5); opacity: 0; }
  }

  .map-pin:hover {
    transform: translate(-50%, -50%) scale(1.5);
    background-color: #fff; box-shadow: 0 0 30px #fff; z-index: 50;
  }

  /* Tooltip */
  .map-pin .tooltip {
    position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%);
    background: rgba(0, 0, 0, 0.9); color: #fbbf24;
    padding: 6px 14px; border-radius: 8px; font-weight: bold; font-size: 15px;
    white-space: nowrap; opacity: 0; pointer-events: none; transition: 0.3s ease;
    border: 1px solid rgba(251, 191, 36, 0.5); box-shadow: 0 10px 20px rgba(0,0,0,0.8);
  }
  .map-pin:hover .tooltip { opacity: 1; bottom: 30px; }

  /* ===== CITY DASHBOARD THEMES ===== */
  #city-screen { transition: background-image 1s ease-in-out, background-color 1s ease; }
  .theme-default { background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)), url('gujarat_night_city_bg.jpg') center/cover fixed; }
  .theme-travel { background: linear-gradient(rgba(15,32,39,0.8), rgba(44,83,100,0.95)), url('travel_scenery_bg.jpg') center/cover fixed; }
  .theme-food { background: linear-gradient(rgba(62,31,13,0.85), rgba(0,0,0,0.95)), url('spices_restaurant_bg.jpg') center/cover fixed; }
  .theme-culture { background: linear-gradient(rgba(59,10,69,0.85), rgba(0,0,0,0.95)), url('culture_festival_bg.jpg') center/cover fixed; }

  /* ===== CARD STYLE ===== */
  .glass { background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.15); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5); }
  .button-style { padding: 12px 30px; border-radius: 30px; background: rgba(255, 255, 255, 0.1); color: white; font-weight: bold; border: 1px solid rgba(255,255,255,0.3); transition: 0.3s; cursor: pointer; }
  .button-style:hover { transform: scale(1.05); background: white; color: black; }
  .button-active { background: white; color: black; }

  .back-btn { position: fixed; top: 20px; left: 20px; z-index: 100; padding: 10px 20px; background: rgba(0, 0, 0, 0.8); border: 1px solid #fbbf24; color: #fbbf24; border-radius: 30px; font-weight: bold; cursor: pointer; transition: 0.3s; backdrop-filter: blur(10px); }
  .back-btn:hover { background: #fbbf24; color: black; }
</style>
</head>

/* ===== APP LOGIC ===== */

function openCityPage(cityKey, gujaratiName) {
  selectedCity = cityKey;
  
  document.getElementById("map-screen").classList.remove("screen-active");
  document.getElementById("map-screen").classList.add("screen-hidden");
  
  document.getElementById("city-screen").classList.remove("screen-hidden");
  document.getElementById("city-screen").classList.add("screen-active");
  
  document.getElementById("cityTitle").innerText = gujaratiName;
  
  showSection('travel');
  window.scrollTo(0,0);
}

function closeCityPage() {
  document.getElementById("city-screen").classList.remove("screen-active");
  document.getElementById("city-screen").classList.add("screen-hidden");
  
  document.getElementById("map-screen").classList.remove("screen-hidden");
  document.getElementById("map-screen").classList.add("screen-active");
  window.scrollTo(0,0);
}

function getDynamicLink(title, type) {
  if (type === "travel") return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(title + " Gujarat")}`;
  if (type === "food") return `https://www.youtube.com/results?search_query=${encodeURIComponent(title + " recipe in gujarati")}`;
  if (type === "culture") return `https://www.google.com/search?q=${encodeURIComponent(title + " વિશે માહિતી ગુજરાત")}`;
  return "#";
}

function showSection(type) {
  const screen = document.getElementById("city-screen");
  screen.className = "screen screen-active"; 
  if(type === "travel") screen.classList.add("theme-travel");
  if(type === "food") screen.classList.add("theme-food");
  if(type === "culture") screen.classList.add("theme-culture");

  resetButtons();
  document.getElementById("btn-" + type).classList.add("button-active");

  const titles = { travel: "જોવા લાયક સ્થળો", food: "પ્રખ્યાત વાનગીઓ", culture: "સ્થાનિક સંસ્કૃતિ" };
  document.getElementById("categoryTitle").innerText = titles[type];

  const content = cityData[selectedCity][type] || [];
  let html = "";
  
  let actionText = type === "travel" ? "📍 નકશા પર જુઓ" : type === "food" ? "🍲 રેસીપી વિડીયો" : "📖 ગૂગલ પર વાંચો";

  content.forEach(item => {
    const externalLink = getDynamicLink(item.title, type);
    html += `
    <a href="${externalLink}" target="_blank" class="content-card glass rounded-2xl overflow-hidden p-5 flex flex-col h-full hover:border-yellow-400/50 transition duration-300 group block cursor-pointer text-left">
      <div class="overflow-hidden h-48 mb-4 rounded-xl shadow-lg relative bg-black/50 flex items-center justify-center">
        <img src="${item.img}" onerror="this.src='https://via.placeholder.com/400x300/222/FFF?text='+encodeURIComponent('${item.title}')" class="h-full w-full object-cover">
        <div class="absolute inset-0 bg-black bg-opacity-40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition duration-300">
          <span class="bg-yellow-500 text-black px-4 py-2 rounded-full font-bold text-sm shadow-xl">${actionText}</span>
        </div>
      </div>
      <h3 class="font-bold text-2xl mb-2 text-yellow-300 group-hover:underline decoration-yellow-300">${item.title}</h3>
      <p class="text-base opacity-90 leading-relaxed text-gray-100 flex-grow">${item.desc}</p>
    </a>`;
  });
  
  document.getElementById("dynamicContent").innerHTML = html;
}

function resetButtons() {
  document.getElementById("btn-travel").classList.remove("button-active");
  document.getElementById("btn-food").classList.remove("button-active");
  document.getElementById("btn-culture").classList.remove("button-active");
}
</script>
